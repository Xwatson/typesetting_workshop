name: Build Packages

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[build]

      - name: Run tests
        run: python -m unittest discover -s tests

      - name: Build package with PyInstaller
        run: |
          pyinstaller --noconfirm --clean packaging/typesetting_workshop.spec

      - name: Archive macOS app
        if: runner.os == 'macOS'
        run: |
          cd dist
          ditto -c -k --sequesterRsrc --keepParent typesetting-workshop.app typesetting-workshop-macos.zip

      - name: Archive Windows app
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path dist/typesetting-workshop/* -DestinationPath dist/typesetting-workshop-windows.zip -Force

      - name: Upload Windows bundle
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: typesetting-workshop-Windows-bundle
          path: dist/typesetting-workshop

      - name: Upload macOS app bundle
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: typesetting-workshop-macOS-app
          path: dist/typesetting-workshop.app

      - name: Upload packaged archive
        uses: actions/upload-artifact@v4
        with:
          name: typesetting-workshop-${{ runner.os }}-archive
          path: dist/*.zip
